name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Download libbox.aar
        run: |
          mkdir -p app/libs
          curl -L https://github.com/SagerNet/sing-box/releases/download/v1.11.4/libbox-android-v1.11.4.aar -o app/libs/libbox.aar

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build with Gradle
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zivchik-gavno-debug
          path: app/build/outputs/apk/debug/app-debug.apk
